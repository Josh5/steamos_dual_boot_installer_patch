name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      # --
      - name: Checkout repository
        uses: actions/checkout@v4

      # --
      - name: Setup Build ENV
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable

      # --
      - name: Prepare build environment
        shell: bash
        id: prepare
        run: |
          set -euo pipefail

          tool_version="$(sed -n 's/^# Version: //p' run.sh | head -n 1)"
          binary_name="steamos-installer-wizard"
          artifact_name="${binary_name}-${tool_version}-linux-x86_64"

          echo "tool_version=${tool_version:?}" >> "$GITHUB_OUTPUT"
          echo "binary_name=${binary_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      # --
      - name: Build Release Binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked

      # --
      - name: Package Release Artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp \
            "target/release/${{ steps.prepare.outputs.binary_name }}" \
            "dist/${{ steps.prepare.outputs.artifact_name }}"

          sha256sum "dist/${{ steps.prepare.outputs.artifact_name }}" \
            > "dist/${{ steps.prepare.outputs.artifact_name }}.sha256"

          tar -C dist -czf \
            "dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz" \
            "${{ steps.prepare.outputs.artifact_name }}"

          sha256sum "dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz" \
            > "dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz.sha256"

      # --
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: dist/*

      # --
      - name: Check Version Tag Already Exists
        uses: mukunku/tag-exists-action@bdad1eaa119ce71b150b952c97351c75025c06a9 #v1.6.0
        id: check_version_tag_exists
        with:
          tag: ${{ steps.prepare.outputs.tool_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --
      - name: Generate Tagged Release
        uses: ncipollo/release-action@440c8c1cb0ed28b9f43e4d1d670870f059653174 #v1.16.0
        if: steps.check_version_tag_exists.outputs.exists == 'false'
        with:
          name: "Tagged Build: ${{ steps.prepare.outputs.tool_version }}"
          body: "Versioned release"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./dist/${{ steps.prepare.outputs.artifact_name }},./dist/${{ steps.prepare.outputs.artifact_name }}.sha256,./dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz,./dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz.sha256"
          generateReleaseNotes: true
          allowUpdates: false
          skipIfReleaseExists: true
          tag: ${{ steps.prepare.outputs.tool_version }}
          commit: ${{ github.sha }}

      # --
      - name: Check Latest Tag Already Exists
        uses: mukunku/tag-exists-action@bdad1eaa119ce71b150b952c97351c75025c06a9 #v1.6.0
        id: check_latest_tag_exists
        with:
          tag: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --
      - name: Delete Latest Release
        if: steps.check_latest_tag_exists.outputs.exists == 'true'
        shell: bash
        run: gh release delete latest --cleanup-tag --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --
      - name: Generate Latest Release
        uses: ncipollo/release-action@440c8c1cb0ed28b9f43e4d1d670870f059653174 #v1.16.0
        with:
          name: "Development Build"
          body: "Latest development release"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./dist/${{ steps.prepare.outputs.artifact_name }},./dist/${{ steps.prepare.outputs.artifact_name }}.sha256,./dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz,./dist/${{ steps.prepare.outputs.artifact_name }}.tar.gz.sha256"
          generateReleaseNotes: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: latest
          commit: ${{ github.sha }}
          prerelease: true
